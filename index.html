<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kali — Kaleidoscope</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #121418;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #canvas-container {
      flex: 1;
      overflow: hidden;
    }
    #canvas-container canvas {
      display: block;
      max-width: 100%;
    }

    /* Right image-selection panel — width must match PANEL_W in sketch_kali.js */
    #image-panel {
      position: relative;
      z-index: 10;
      width: 210px;
      min-width: 210px;
      background: #14171e;
      border-left: 1px solid #2a2d36;
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow: hidden;
    }

    #panel-header {
      padding: 10px 12px 8px;
      color: #888;
      font: 600 11px/1 'Open Sans', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-bottom: 1px solid #2a2d36;
      flex-shrink: 0;
    }

    #thumb-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* scrollbar */
    #thumb-list::-webkit-scrollbar { width: 4px; }
    #thumb-list::-webkit-scrollbar-track { background: transparent; }
    #thumb-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .thumb-btn {
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 5px;
      overflow: hidden;
      background: #1a1d26;
      padding: 0;
      width: 100%;
      transition: border-color 0.12s;
    }
    .thumb-btn img {
      width: 100%;
      display: block;
      aspect-ratio: 3 / 2;
      object-fit: cover;
    }
    .thumb-btn span {
      display: block;
      padding: 4px 6px;
      color: #999;
      font: 11px/1.3 'Open Sans', sans-serif;
      text-align: left;
    }
    .thumb-btn.active  { border-color: #ef5350; }
    .thumb-btn:hover:not(.active) { border-color: #6eb5ff; }

    #panel-footer {
      padding: 8px;
      border-top: 1px solid #2a2d36;
      flex-shrink: 0;
    }

    #upload-btn {
      width: 100%;
      padding: 7px 0;
      background: #1e2230;
      border: 1px dashed #444;
      border-radius: 5px;
      color: #888;
      font: 11px/1 'Open Sans', sans-serif;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s;
    }
    #upload-btn:hover { border-color: #6eb5ff; color: #ccc; }
    #file-input { display: none; }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="image-panel">
    <div id="panel-header">Images</div>
    <div id="thumb-list">

      <button class="thumb-btn active" onclick="switchImage('wildflowers.jpg', this)">
        <img src="wildflowers.jpg" alt="Wildflowers">
        <span>Wildflowers</span>
      </button>

      <button class="thumb-btn" onclick="switchImage('images/havasu.jpg', this)">
        <img src="images/havasu.jpg" alt="Havasu Falls">
        <span>Havasu Falls</span>
      </button>

      <button class="thumb-btn" onclick="switchImage('images/yellowstone.jpg', this)">
        <img src="images/yellowstone.jpg" alt="Yellowstone">
        <span>Yellowstone</span>
      </button>

      <button class="thumb-btn" onclick="switchImage('images/cute.jpg', this)">
        <img src="images/cute.jpg" alt="Cute">
        <span>Cute</span>
      </button>

    </div>

    <div id="panel-footer">
      <input type="file" id="file-input" accept="image/*" onchange="loadFromFile(this)">
      <button id="upload-btn" onclick="document.getElementById('file-input').click()">
        + Add image
      </button>
    </div>
  </div>

  <script>
    function switchImage(src, btn) {
      document.querySelectorAll('.thumb-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (window._kaliSetImage) window._kaliSetImage(src);
    }

    function loadFromFile(input) {
      const file = input.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);

      // Add a new thumbnail
      const btn = document.createElement('button');
      btn.className = 'thumb-btn';
      btn.onclick = () => switchImage(url, btn);
      btn.innerHTML = `<img src="${url}" alt="${file.name}">
                       <span>${file.name}</span>`;
      document.getElementById('thumb-list').appendChild(btn);
      switchImage(url, btn);
    }
  </script>

  <script src="sketch_kali.js"></script>
</body>
</html>
